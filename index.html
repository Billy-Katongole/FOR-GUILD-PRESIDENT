<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Billy Katongole Asiimwe – Guild President 2026-2027</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --orange-dark: #c45000;
      --orange-mid:  #e8720c;
      --orange-light:#ff9a3c;
      --cream:       #fff8f0;
      --white:       #ffffff;
      --black:       #0a0a0a;
      --charcoal:    #1a1a2e;
    }

    html, body {
      min-height: 100vh;
      font-family: 'Montserrat', sans-serif;
      background: var(--charcoal);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* ── decorative background pattern ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 80% at 50% 110%, var(--orange-dark) 0%, transparent 65%),
        radial-gradient(ellipse 80% 60% at 80% -10%, rgba(232,114,12,.25) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* faint kente-style diamond grid overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        repeating-linear-gradient(45deg, rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 1px, transparent 0, transparent 50%),
        repeating-linear-gradient(-45deg, rgba(255,255,255,.03) 0, rgba(255,255,255,.03) 1px, transparent 0, transparent 50%);
      background-size: 28px 28px;
      pointer-events: none;
      z-index: 0;
    }

    /* ── card ── */
    .card {
      position: relative;
      z-index: 1;
      width: min(480px, 96vw);
      background: linear-gradient(175deg, #ffffff 0%, #fff4ea 55%, #ffdbb8 100%);
      border-radius: 28px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(232,114,12,.3),
        0 30px 80px rgba(0,0,0,.55),
        0 4px 16px rgba(196,80,0,.35);
      animation: fadeUp .7s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── top banner ── */
    .banner {
      background: var(--black);
      text-align: center;
      padding: 18px 24px 14px;
      position: relative;
    }
    .banner::after {
      content: '';
      display: block;
      height: 4px;
      background: linear-gradient(90deg, var(--orange-dark), var(--orange-light), var(--orange-dark));
    }
    .banner h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 8vw, 2.8rem);
      letter-spacing: .12em;
      color: var(--white);
      line-height: 1;
    }

    /* ── photo section ── */
    .photo-row {
      position: relative;
      background: linear-gradient(180deg, #f5f0eb 0%, #fde8cc 100%);
      min-height: 320px;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    /* university logo */
    .logo-badge {
      position: absolute;
      top: 20px;
      left: 22px;
      width: 72px;
      height: 72px;
      border-radius: 50%;
      border: 3px solid var(--orange-mid);
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      box-shadow: 0 4px 14px rgba(0,0,0,.18);
    }
    .logo-badge img {
      width: 64px;
      height: 64px;
      object-fit: contain;
    }
    /* fallback shield icon if image fails */
    .logo-badge .shield {
      font-size: 2.2rem;
    }

    /* vote badge */
    .vote-badge {
      position: absolute;
      top: 20px;
      right: 22px;
      background: white;
      border-radius: 10px;
      padding: 8px 14px;
      text-align: center;
      box-shadow: 0 4px 14px rgba(0,0,0,.15);
      border: 2px solid var(--orange-light);
    }
    .vote-badge .vote-word {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.6rem;
      letter-spacing: .1em;
      color: var(--black);
      line-height: 1;
    }
    .vote-badge .vote-word span.check {
      color: #c00;
    }
    .vote-badge .vote-year {
      font-size: .7rem;
      font-weight: 700;
      color: #555;
      letter-spacing: .05em;
    }

    /* candidate photo placeholder – gradient silhouette */
    .candidate-photo {
      width: 260px;
      height: 310px;
      object-fit: cover;
      object-position: top center;
      display: block;
      position: relative;
      z-index: 1;
      /* slight drop-shadow for cutout feel */
      filter: drop-shadow(0 -4px 20px rgba(0,0,0,.12));
    }

    /* gradient overlay at bottom of photo row */
    .photo-row::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 90px;
      background: linear-gradient(0deg, #fde8cc, transparent);
      z-index: 0;
    }

    /* ── name block ── */
    .name-block {
      background: linear-gradient(160deg, var(--orange-dark) 0%, var(--orange-light) 100%);
      padding: 22px 28px 18px;
      text-align: center;
      position: relative;
    }
    .name-block::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }
    .candidate-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(2rem, 9vw, 2.8rem);
      color: var(--white);
      letter-spacing: .06em;
      line-height: 1.05;
      position: relative;
      text-shadow: 0 2px 8px rgba(0,0,0,.3);
    }
    .candidate-name .first { display: block; }
    .candidate-name .last  {
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }
    .verified {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      background: var(--orange-mid);
      border: 2px solid white;
      border-radius: 50%;
      color: white;
      font-size: .9rem;
      vertical-align: middle;
      box-shadow: 0 2px 6px rgba(0,0,0,.25);
      flex-shrink: 0;
    }

    /* ── tagline & hashtag ── */
    .tagline {
      font-size: .8rem;
      font-weight: 600;
      color: rgba(255,255,255,.88);
      letter-spacing: .15em;
      margin-top: 6px;
      text-transform: uppercase;
      position: relative;
    }
    .hashtag-pill {
      display: inline-block;
      background: white;
      color: var(--orange-dark);
      font-weight: 700;
      font-size: .8rem;
      letter-spacing: .05em;
      padding: 5px 18px;
      border-radius: 30px;
      margin-top: 10px;
      position: relative;
      box-shadow: 0 3px 10px rgba(0,0,0,.15);
    }

    /* ── CTA button ── */
    .cta-wrapper {
      padding: 24px 28px 30px;
      text-align: center;
      background: linear-gradient(180deg, #fde8cc, var(--cream));
    }
    .vote-btn {
      display: inline-block;
      text-decoration: none;
      background: linear-gradient(135deg, var(--orange-dark) 0%, var(--orange-light) 100%);
      color: white;
      font-family: 'Montserrat', sans-serif;
      font-weight: 900;
      font-size: 1.1rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      padding: 16px 44px;
      border-radius: 50px;
      border: none;
      cursor: pointer;
      box-shadow:
        0 8px 24px rgba(196,80,0,.45),
        0 2px 6px rgba(0,0,0,.15),
        inset 0 1px 0 rgba(255,255,255,.2);
      transition: transform .18s ease, box-shadow .18s ease, filter .18s ease;
      position: relative;
      overflow: hidden;
    }
    .vote-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.18) 0%, transparent 60%);
      border-radius: inherit;
    }
    .vote-btn:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 14px 36px rgba(196,80,0,.55),
        0 4px 12px rgba(0,0,0,.2);
      filter: brightness(1.06);
    }
    .vote-btn:active {
      transform: translateY(0) scale(.98);
    }
    .vote-btn-sub {
      font-size: .68rem;
      color: #a05020;
      margin-top: 9px;
      letter-spacing: .04em;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="card">

    <!-- Top banner -->
    <div class="banner">
      <h1>Guild President</h1>
    </div>

    <!-- Photo area -->
    <div class="photo-row">

      <!-- University logo (uses NDU crest from their site) -->
      <div class="logo-badge">
        <img
          src="https://www.ndu.ac.ug/wp-content/uploads/2021/01/NDU-Logo.png"
          alt="NDU Crest"
          onerror="this.style.display='none';this.nextElementSibling.style.display='flex';"
        />
        <span class="shield" style="display:none;">🛡️</span>
      </div>

      <!-- Vote badge -->
      <div class="vote-badge">
        <div class="vote-word">V<span class="check">✓</span>TE</div>
        <div class="vote-year">2026–2027</div>
      </div>

      <!--
        ══ CANDIDATE PHOTO ══
        Replace the src below with the actual photo URL or a relative path
        such as "billy.jpg" placed in the same folder as this index.html.
        GitHub Pages will serve it automatically.
      -->
      <img
        class="candidate-photo"
        src="WhatsApp_Image_2026-04-21_at_7_15_57_PM.jpeg"
        alt="Billy Katongole Asiimwe"
        onerror="this.style.background='linear-gradient(180deg,#e8d5c0,#c4956a)';this.src='';"
      />
    </div>

    <!-- Name block -->
    <div class="name-block">
      <div class="candidate-name">
        <span class="first">Billy Katongole</span>
        <span class="last">
          Asiimwe
          <span class="verified" aria-label="Verified">✓</span>
        </span>
      </div>
      <div class="tagline">"Transformative Leadership"</div>
      <div class="hashtag-pill">#the Trailblazer</div>
    </div>

    <!-- CTA -->
    <div class="cta-wrapper">
      <a class="vote-btn" href="https://myvote.ndu.ac.ug/login" target="_blank" rel="noopener noreferrer">
        🗳️ &nbsp;Cast Your Vote
      </a>
      <div class="vote-btn-sub">Click to vote at myvote.ndu.ac.ug</div>
    </div>

  </div>
</body>
</html>
